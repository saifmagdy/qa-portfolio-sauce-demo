[pytest]
testpaths = tests
addopts =
    -v
        --tb=short
            --html=reports/report.html
                --self-contained-html

                markers =
                    smoke: Smoke tests - fast, critical path only
                        regression: Full regression test suite
                            api: API-level tests
                                ui: UI / browser-based tests

                                log_cli = true
                                log_cli_level = INFO
